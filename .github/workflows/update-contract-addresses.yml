name: Update Contract Addresses

on:
  schedule:
    - cron: "0 2 * * 1" # Weekly Monday 02:00 UTC

  repository_dispatch:
    types: [governor-scripts-update]

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Show changes without writing"
        type: boolean
        default: false
      skip_verify:
        description: "Skip Arbiscan/Etherscan verification"
        type: boolean
        default: false
      scan_fix:
        description: "Scan v2/ for stale addresses and auto-fix"
        type: boolean
        default: true
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  update-contracts:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.use_test_branch == 'true' && vars.TEST_BRANCH || vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and verify contract addresses
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          ARBISCAN_API_KEY: ${{ secrets.ARBISCAN_API_KEY }}
          ETHERSCAN_API_KEY: ${{ secrets.ETHERSCAN_API_KEY }}
        run: |
          FLAGS=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then FLAGS="$FLAGS --dry-run"; fi
          if [[ "${{ inputs.skip_verify }}" == "true" ]]; then FLAGS="$FLAGS --skip-verify"; fi
          if [[ "${{ inputs.scan_fix }}" == "true" ]]; then FLAGS="$FLAGS --scan-fix"; fi
          node .github/scripts/fetch-contract-addresses-v2.js $FLAGS

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --name-only
          fi

      - name: Check for enrichment warnings
        id: warnings
        run: |
          node -e "
            const fs = require('fs');
            const content = fs.readFileSync('snippets/data/contract-addresses/contractAddressesData.jsx', 'utf8');
            const match = content.match(/export const contractAddresses\s*=\s*(\{[\s\S]*\});?\s*$/);
            if (!match) { console.log('has_warnings=false'); process.exit(0); }
            const data = new Function('return ' + match[1])();
            const warnings = data.meta?._warnings || [];
            if (warnings.length > 0) {
              console.log('has_warnings=true');
              const body = warnings.map(w => '- **' + w.contract + '** (' + w.source + '): ' + w.error).join('\n');
              require('fs').writeFileSync('/tmp/warning-body.txt', body);
            } else {
              console.log('has_warnings=false');
            }
          " >> $GITHUB_OUTPUT

      - name: Create issue on enrichment failure
        if: steps.warnings.outputs.has_warnings == 'true' && inputs.dry_run != 'true'
        env:
          GH_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          BODY=$(cat /tmp/warning-body.txt)
          gh issue create \
            --title "Contract enrichment API failure — $(date +%Y-%m-%d)" \
            --body "## Contract Address Enrichment Failures

          The weekly contract address pipeline encountered API failures during metadata enrichment. Some contract data may be stale.

          ### Failed contracts:
          ${BODY}

          ### Action required:
          - Check if Blockscout or Etherscan APIs have changed
          - Verify API keys are still valid
          - Re-run workflow manually after fixing

          _Auto-generated by update-contract-addresses.yml_" \
            --label "api-drift,automated" \
            --assignee "@me"

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snippets/data/contract-addresses/contractAddressesData.jsx
          git add v2/
          git commit -m "chore: update contract addresses from governor-scripts [skip ci]"
          git push
