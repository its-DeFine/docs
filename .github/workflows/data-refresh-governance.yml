name: Data Refresh Governance

on:
  workflow_call:
    inputs:
      mode:
        description: "Governed data-refresh mode"
        required: true
        type: string
      use_test_branch:
        description: "Write to TEST_BRANCH instead of DEPLOY_BRANCH"
        required: false
        default: false
        type: boolean
      version:
        description: "Optional version override for livepeer-release mode"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      mode:
        description: "Governed data-refresh mode"
        required: true
        type: choice
        options:
          - forum
          - ghost-blog
          - youtube
          - github
          - discord
          - rss-blog
          - livepeer-release
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false
      version:
        description: "Optional version override for livepeer-release mode"
        required: false
        type: string

jobs:
  data-refresh:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.use_test_branch && vars.TEST_BRANCH || vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target branch
        id: branch
        run: |
          if [ "${{ inputs.use_test_branch }}" = "true" ]; then
            echo "name=${{ vars.TEST_BRANCH }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ vars.DEPLOY_BRANCH }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Resolve livepeer release version
        if: ${{ inputs.mode == 'livepeer-release' }}
        id: version
        run: |
          if [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "source=input" >> "$GITHUB_OUTPUT"
          else
            VERSION=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/livepeer/go-livepeer/releases/latest" \
              | jq -r '.tag_name')
            echo "source=api_fallback" >> "$GITHUB_OUTPUT"
          fi
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "Resolved version: ${VERSION}"

      - name: Read current release version
        if: ${{ inputs.mode == 'livepeer-release' }}
        id: current
        run: |
          CURRENT=$(grep -oP 'latestVersion = "\K[^"]+' snippets/automations/globals/globals.jsx || echo "")
          echo "version=${CURRENT}" >> "$GITHUB_OUTPUT"
          echo "Current version: ${CURRENT}"

      - name: Run selected refresh mode
        env:
          DISCORD_BOT_TOKEN: ${{ secrets.DISCORD_BOT_TOKEN }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          YOUTUBE_API_KEY: ${{ secrets.YOUTUBE_API_KEY }}
          CHANNEL_ID: UCzfHtZnmUzMbJDxGCwIgY2g
        run: |
          case "${{ inputs.mode }}" in
            forum)
              node .github/scripts/fetch-forum-data.js
              ;;
            ghost-blog)
              node .github/scripts/fetch-ghost-blog-data.js
              ;;
            youtube)
              node .github/scripts/fetch-youtube-data.js
              ;;
            github)
              node .github/scripts/fetch-github-discussions.js
              node .github/scripts/fetch-github-releases.js
              ;;
            discord)
              node .github/scripts/fetch-discord-announcements.js
              ;;
            rss-blog)
              node .github/scripts/fetch-rss-blog-data.js
              ;;
            livepeer-release)
              if [[ "${{ steps.version.outputs.version }}" != "${{ steps.current.outputs.version }}" && "${{ steps.version.outputs.version }}" != "null" && -n "${{ steps.version.outputs.version }}" ]]; then
                VERSION="${{ steps.version.outputs.version }}"
                sed -i "s|latestVersion = \"[^\"]*\"|latestVersion = \"${VERSION}\"|" snippets/automations/globals/globals.jsx
                sed -i "s|releases/download/[^\"]*\"|releases/download/${VERSION}\"|" snippets/automations/globals/globals.jsx
                echo "Updated globals.jsx:"
                cat snippets/automations/globals/globals.jsx
              else
                echo "No release update required."
              fi
              ;;
            *)
              echo "Unsupported data-refresh mode: ${{ inputs.mode }}"
              exit 1
              ;;
          esac

      - name: Check for generated changes
        id: git-check
        run: |
          case "${{ inputs.mode }}" in
            forum)
              git diff --exit-code snippets/automations/forum/forumData.jsx || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
            ghost-blog)
              git diff --exit-code snippets/automations/blog/ghostBlogData.jsx || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
            youtube)
              git diff --exit-code snippets/automations/youtube/youtubeData.jsx || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
            github|discord|rss-blog)
              git diff --exit-code snippets/automations/ || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
            livepeer-release)
              git diff --exit-code snippets/automations/globals/globals.jsx || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
            *)
              echo "Unsupported diff mode: ${{ inputs.mode }}"
              exit 1
              ;;
          esac

      - name: Commit and push if changed
        if: ${{ steps.git-check.outputs.changed == 'true' }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"

          case "${{ inputs.mode }}" in
            forum)
              git add snippets/automations/forum/forumData.jsx
              git commit -m "chore: update forum data [skip ci]"
              ;;
            ghost-blog)
              git add snippets/automations/blog/ghostBlogData.jsx
              git commit -m "chore: update Ghost blog data [skip ci]"
              ;;
            youtube)
              git add snippets/automations/youtube/youtubeData.jsx
              git commit -m "Update YouTube videos - $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              ;;
            github)
              git add snippets/automations
              git commit -m "chore: update GitHub discussions & releases data [skip ci]"
              ;;
            discord)
              git add snippets/automations
              git commit -m "chore: update Discord announcements data [skip ci]"
              ;;
            rss-blog)
              git add snippets/automations
              git commit -m "chore: update RSS blog data [skip ci]"
              ;;
            livepeer-release)
              git add snippets/automations/globals/globals.jsx
              git commit -m "chore: update go-livepeer release to ${{ steps.version.outputs.version }} [skip ci]"
              ;;
            *)
              echo "Unsupported commit mode: ${{ inputs.mode }}"
              exit 1
              ;;
          esac

          git push origin HEAD:${{ steps.branch.outputs.name }}
