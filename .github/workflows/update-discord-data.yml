name: Update Discord Announcements Data

on:
  schedule:
    - cron: "0 1 * * *" # Daily at 01:00 UTC
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  update-discord-data:
    uses: ./.github/workflows/data-refresh-governance.yml
    with:
      mode: discord
      use_test_branch: ${{ inputs.use_test_branch || false }}
    secrets: inherit
