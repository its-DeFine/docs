# type: integrator
# concern: copy
# pipeline: P5-auto
# Retains generated forum data under snippets/data/social-feeds/forumData.jsx.
# Legacy entrypoint kept as a compatibility wrapper during workflow consolidation.
name: Update Forum Data

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  update-forum-data:
    uses: ./.github/workflows/dispatch-copy-update-social-feeds.yml
    with:
      mode: forum
      use_test_branch: ${{ inputs.use_test_branch || false }}
    secrets: inherit
