# type: validator
# concern: discoverability
# pipeline: P3
name: Verify llms.txt Files

on:
  push:
    branches:
      - docs-v2
  pull_request:
    branches:
      - docs-v2
  workflow_dispatch:

permissions:
  contents: read
jobs:
  verify-llms-files:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd tools && npm ci

      - name: Verify llms outputs
        run: node operations/scripts/generators/ai/llm/generate-llms-files.js --check
