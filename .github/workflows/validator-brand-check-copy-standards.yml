# type: validator
# concern: brand
# pipeline: P2
# validator-brand-check-copy-standards.yml
# P2 hard gate: blocks merge on copy/brand violations.
# Promoted from P3 advisory per D-GOV-05 (2026-04-08).
# Decision: D-GOV-03 (every detection must self-repair or escalate)
name: Check Copy Standards

on:
  pull_request:
    paths:
      - 'v2/**/*.mdx'
      - 'docs-guide/**/*.mdx'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  copy-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Banned Words
            script: operations/scripts/validators/content/copy/lint-copy.js
          - name: Copy Patterns
            script: operations/scripts/validators/content/copy/lint-patterns.js
          - name: EN-GB Grammar
            script: operations/scripts/validators/content/grammar/check-grammar-en-gb.js
          - name: Proper Nouns
            script: operations/scripts/validators/content/grammar/check-proper-nouns.js

    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd tools && npm ci

      - name: Run ${{ matrix.name }}
        id: check
        run: node ${{ matrix.script }}

      - name: Step summary
        if: always()
        run: |
          if [ "${{ steps.check.outcome }}" = "failure" ]; then
            echo "## ${{ matrix.name }}: FAILED" >> $GITHUB_STEP_SUMMARY
          else
            echo "## ${{ matrix.name }}: clean" >> $GITHUB_STEP_SUMMARY
          fi

  auto-repair:
    name: Auto-repair EN-GB style
    needs: copy-lint
    if: failure()
    runs-on: ubuntu-latest
    permissions:
      contents: write
      pull-requests: write
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd tools && npm ci

      - name: Run EN-GB style homogeniser on changed files
        run: node operations/scripts/audits/content/style/style-and-language-homogenizer-en-gb.js --scope changed

      - name: Create repair PR
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'fix(copy): auto-repair EN-GB style violations'
          title: 'fix(copy): auto-repair EN-GB style violations'
          body: 'Automated EN-GB style repair triggered by brand check failure. Review before merging.'
          branch: fix/auto-repair-en-gb-style
          labels: copy, automated
