name: Docs Catalog Governance

on:
  workflow_call:
    inputs:
      mode:
        description: "Governed docs-catalog-governance mode"
        required: true
        type: string
      use_test_branch:
        description: "Write to TEST_BRANCH instead of DEPLOY_BRANCH for generate modes"
        required: false
        default: false
        type: boolean
      run_frontmatter_check:
        description: "Run changed-page frontmatter taxonomy validation"
        required: false
        default: false
        type: boolean
      base_ref:
        description: "Pull request base ref for changed-file validation"
        required: false
        default: ""
        type: string
  workflow_dispatch:
    inputs:
      mode:
        description: "Governed docs-catalog-governance mode"
        required: true
        type: choice
        options:
          - check-docs-guide-catalogs
          - check-docs-index
          - generate-component-registry
          - generate-docs-guide-catalogs
          - generate-docs-index
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH for generate modes"
        type: boolean
        default: false

jobs:
  catalog-checks:
    if: ${{ inputs.mode == 'check-docs-guide-catalogs' || inputs.mode == 'check-docs-index' }}
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Fetch pull request base ref
        if: ${{ inputs.run_frontmatter_check && inputs.base_ref != '' }}
        run: git fetch --no-tags --depth=1 origin "${{ inputs.base_ref }}"

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tooling dependencies
        run: npm --prefix tools ci

      - name: Run selected check mode
        run: |
          case "${{ inputs.mode }}" in
            check-docs-guide-catalogs)
              node operations/scripts/generators/components/library/generate-component-registry.js --validate-only
              node operations/scripts/generators/components/documentation/generate-component-docs.js --check
              node operations/scripts/validators/components/library/check-component-health.js --check
              node operations/scripts/generators/components/library/generate-component-examples.js --check
              node operations/scripts/generators/governance/catalogs/generate-docs-guide-indexes.js --check
              node operations/scripts/generators/governance/catalogs/generate-docs-guide-pages-index.js --check
              ;;
            check-docs-index)
              node operations/scripts/generators/content/catalogs/generate-docs-index.js --check
              ;;
            *)
              echo "Unsupported check mode: ${{ inputs.mode }}"
              exit 1
              ;;
          esac

      - name: Check frontmatter taxonomy on changed docs pages
        if: ${{ inputs.mode == 'check-docs-guide-catalogs' && inputs.run_frontmatter_check && inputs.base_ref != '' }}
        run: |
          CHANGED=$(git diff --name-only "origin/${{ inputs.base_ref }}...HEAD" | grep -E '^(v2|docs-guide)/.*\.mdx$' | tr '\n' ',' | sed 's/,$//')
          if [ -n "$CHANGED" ]; then
            node operations/tests/unit/quality.test.js --files "$CHANGED"
          else
            echo "No routable docs pages changed — skipping frontmatter check."
          fi

  catalog-generate:
    if: ${{ inputs.mode == 'generate-component-registry' || inputs.mode == 'generate-docs-guide-catalogs' || inputs.mode == 'generate-docs-index' }}
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.use_test_branch && vars.TEST_BRANCH || vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target branch
        id: branch
        run: |
          if [ "${{ inputs.use_test_branch }}" = "true" ]; then
            echo "name=${{ vars.TEST_BRANCH }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ vars.DEPLOY_BRANCH }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install tooling dependencies
        working-directory: tools
        run: npm install

      - name: Run selected generate mode
        run: |
          case "${{ inputs.mode }}" in
            generate-component-registry)
              node operations/scripts/generators/components/library/generate-component-registry.js
              ;;
            generate-docs-guide-catalogs)
              node operations/scripts/generators/governance/catalogs/generate-docs-guide-indexes.js --write
              node operations/scripts/generators/governance/catalogs/generate-docs-guide-pages-index.js --write
              node operations/scripts/generators/components/documentation/generate-component-docs.js --write
              ;;
            generate-docs-index)
              node operations/scripts/generators/content/catalogs/generate-docs-index.js --write
              ;;
            *)
              echo "Unsupported generate mode: ${{ inputs.mode }}"
              exit 1
              ;;
          esac

      - name: Check for generated changes
        id: git-check
        run: |
          case "${{ inputs.mode }}" in
            generate-component-registry)
              git diff --exit-code \
                docs-guide/config/component-registry.json \
                docs-guide/config/component-registry-schema.json \
              || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
            generate-docs-guide-catalogs)
              git diff --exit-code \
                docs-guide/catalog/workflows-catalog.mdx \
                docs-guide/catalog/templates-catalog.mdx \
                docs-guide/catalog/pages-catalog.mdx \
                v2/ \
              || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
            generate-docs-index)
              git diff --exit-code docs-index.json || echo "changed=true" >> "$GITHUB_OUTPUT"
              ;;
          esac

      - name: Commit and push if changed
        if: ${{ steps.git-check.outputs.changed == 'true' }}
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"

          case "${{ inputs.mode }}" in
            generate-component-registry)
              git add \
                docs-guide/config/component-registry.json \
                docs-guide/config/component-registry-schema.json
              git commit -m "chore(components): regenerate component registry - $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              ;;
            generate-docs-guide-catalogs)
              git add \
                docs-guide/catalog/workflows-catalog.mdx \
                docs-guide/catalog/templates-catalog.mdx \
                docs-guide/catalog/pages-catalog.mdx \
                v2/
              git commit -m "chore(docs-guide): regenerate catalogs and component docs - $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              ;;
            generate-docs-index)
              git add docs-index.json
              git commit -m "Update docs index - $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
              ;;
            *)
              echo "Unsupported commit mode: ${{ inputs.mode }}"
              exit 1
              ;;
          esac

          git push origin HEAD:${{ steps.branch.outputs.name }}
