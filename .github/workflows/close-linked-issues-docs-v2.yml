name: Close Linked Issues (docs-v2 Merge)

on:
  pull_request:
    types:
      - opened
      - closed

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'docs-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Close linked same-repo issues
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const localRepo = `${owner}/${repo}`.toLowerCase();
            const pr = context.payload.pull_request;
            const prBody = String(pr.body || '');
            const prUrl = pr.html_url;
            const prNumber = pr.number;

            const issueIds = new Set();
            const skippedCrossRepo = [];

            // Closing-keyword references in the PR body.
            const closingRe = /\b(?:fixes|closes|resolves)\s+(?:([A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+))?#(\d+)\b/gi;
            let closingMatch;
            while ((closingMatch = closingRe.exec(prBody)) !== null) {
              const referencedRepo = String(closingMatch[1] || localRepo).toLowerCase();
              const issueNumber = Number(closingMatch[2]);
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) continue;
              if (referencedRepo !== localRepo) {
                skippedCrossRepo.push(`${closingMatch[1]}#${issueNumber}`);
                continue;
              }
              issueIds.add(issueNumber);
            }

            // Codex fallback for legacy/generated bodies.
            const taskLineRe = /\bTask:\s*#(\d+)\b/gi;
            let taskLineMatch;
            while ((taskLineMatch = taskLineRe.exec(prBody)) !== null) {
              const issueNumber = Number(taskLineMatch[1]);
              if (Number.isInteger(issueNumber) && issueNumber > 0) {
                issueIds.add(issueNumber);
              }
            }

            const markerMatch = prBody.match(/codex-pr-body-generated:\s*task_id=(\d+)/i);
            if (markerMatch) {
              const issueNumber = Number(markerMatch[1]);
              if (Number.isInteger(issueNumber) && issueNumber > 0) {
                issueIds.add(issueNumber);
              }
            }

            const closed = [];
            const skipped = [];
            const failed = [];

            for (const issueNumber of issueIds) {
              try {
                const issueResp = await github.rest.issues.get({
                  owner,
                  repo,
                  issue_number: issueNumber
                });
                const issue = issueResp.data;

                if (issue.pull_request) {
                  skipped.push(`#${issueNumber} (is a pull request)`);
                  continue;
                }
                if (String(issue.state).toLowerCase() === 'closed') {
                  skipped.push(`#${issueNumber} (already closed)`);
                  continue;
                }

                await github.rest.issues.update({
                  owner,
                  repo,
                  issue_number: issueNumber,
                  state: 'closed',
                  state_reason: 'completed'
                });

                const marker = `<!-- docs-v2-merge-auto-close: pr=${prNumber}; issue=${issueNumber} -->`;
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner,
                  repo,
                  issue_number: issueNumber,
                  per_page: 100
                });
                const hasMarkerComment = comments.some((comment) => String(comment.body || '').includes(marker));
                if (!hasMarkerComment) {
                  const mergedAt = pr.merged_at ? new Date(pr.merged_at).toISOString().slice(0, 10) : 'unknown';
                  await github.rest.issues.createComment({
                    owner,
                    repo,
                    issue_number: issueNumber,
                    body: [
                      marker,
                      `**Resolved** by PR #${prNumber}: "${pr.title}"`,
                      `Author: @${pr.user.login} | Merged: ${mergedAt}`,
                      `${prUrl}`
                    ].join('\n')
                  });
                }

                closed.push(`#${issueNumber}`);
              } catch (error) {
                failed.push(`#${issueNumber} (${error.message})`);
              }
            }

            if (skippedCrossRepo.length > 0) {
              skipped.push(...skippedCrossRepo.map((entry) => `${entry} (cross-repo ref ignored)`));
            }

            const toMarkdownList = (items, fallback) =>
              items.length > 0 ? items.map((item) => `- ${item}`).join('\n') : `- ${fallback}`;

            await core.summary
              .addHeading('docs-v2 merged PR issue-close summary')
              .addRaw(`PR: #${prNumber} (${prUrl})\n\n`)
              .addRaw('**Closed**\n')
              .addRaw(`${toMarkdownList(closed, 'none')}\n\n`)
              .addRaw('**Skipped**\n')
              .addRaw(`${toMarkdownList(skipped, 'none')}\n\n`)
              .addRaw('**Failed**\n')
              .addRaw(`${toMarkdownList(failed, 'none')}\n`)
              .write();

            console.log(`Closed issues: ${closed.length}`);
            console.log(`Skipped refs: ${skipped.length}`);
            console.log(`Failed refs: ${failed.length}`);

  notify-linked-issues:
    if: github.event.action == 'opened' && github.event.pull_request.base.ref == 'docs-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Notify linked issues that a PR has been opened
        uses: actions/github-script@v7
        with:
          script: |
            const owner = context.repo.owner;
            const repo = context.repo.repo;
            const localRepo = `${owner}/${repo}`.toLowerCase();
            const pr = context.payload.pull_request;
            const prBody = String(pr.body || '');
            const prNumber = pr.number;

            const issueIds = new Set();

            const closingRe = /\b(?:fixes|closes|resolves)\s+(?:([A-Za-z0-9_.-]+\/[A-Za-z0-9_.-]+))?#(\d+)\b/gi;
            let match;
            while ((match = closingRe.exec(prBody)) !== null) {
              const referencedRepo = String(match[1] || localRepo).toLowerCase();
              const issueNumber = Number(match[2]);
              if (!Number.isInteger(issueNumber) || issueNumber <= 0) continue;
              if (referencedRepo !== localRepo) continue;
              issueIds.add(issueNumber);
            }

            const taskLineRe = /\bTask:\s*#(\d+)\b/gi;
            let taskMatch;
            while ((taskMatch = taskLineRe.exec(prBody)) !== null) {
              const issueNumber = Number(taskMatch[1]);
              if (Number.isInteger(issueNumber) && issueNumber > 0) {
                issueIds.add(issueNumber);
              }
            }

            let notified = 0;

            for (const issueNumber of issueIds) {
              try {
                const issue = await github.rest.issues.get({ owner, repo, issue_number: issueNumber });
                if (issue.data.pull_request || String(issue.data.state).toLowerCase() === 'closed') continue;

                const marker = `<!-- pr-opened-for-issue: pr=${prNumber}; issue=${issueNumber} -->`;
                const comments = await github.paginate(github.rest.issues.listComments, {
                  owner, repo, issue_number: issueNumber, per_page: 100
                });
                if (comments.some((c) => String(c.body || '').includes(marker))) continue;

                await github.rest.issues.createComment({
                  owner, repo, issue_number: issueNumber,
                  body: [
                    marker,
                    `PR #${prNumber} opened to address this: ${pr.html_url}`,
                    `Author: @${pr.user.login} | Branch: \`${pr.head.ref}\``
                  ].join('\n')
                });
                notified++;
              } catch (error) {
                console.log(`Failed to notify #${issueNumber}: ${error.message}`);
              }
            }

            console.log(`Notified ${notified} linked issue(s)`);
