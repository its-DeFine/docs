# type: generator
# concern: maintenance
# pipeline: P4
name: Generate Component Registry

on:
  push:
    branches:
      - docs-v2
    paths:
      - 'snippets/components/**/*.jsx'
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true
jobs:
  generate-component-registry:
    uses: ./.github/workflows/dispatch-maintenance-check-catalogs.yml
    with:
      mode: generate-component-registry
      use_test_branch: ${{ inputs.use_test_branch || false }}
    secrets: inherit
