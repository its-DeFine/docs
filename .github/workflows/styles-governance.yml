# type: remediator
# concern: brand
# pipeline: P6
name: Styles Governance
on:
  schedule:
    # Weekly Monday 07:00 UTC — after content-health at 06:00
    - cron: '0 7 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: true
        default: 'audit'
        type: choice
        options:
          - audit
          - remediate-dry-run
          - remediate-write
      scope:
        description: 'Scan scope'
        required: true
        default: 'full'
        type: choice
        options:
          - full
          - staged
      category:
        description: 'Filter to specific category (comma-separated, leave empty for all)'
        required: false
        type: string

permissions:
  contents: write
  pull-requests: write

jobs:
  styles-audit:
    if: inputs.mode == 'audit' || inputs.mode == '' || github.event_name == 'schedule'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd tools && npm ci

      - name: Run styles audit
        run: |
          ARGS="--verbose --json"
          if [ "${{ inputs.category }}" != "" ]; then
            ARGS="$ARGS --category ${{ inputs.category }}"
          fi
          node tools/scripts/validators/styles/audit-styles.js $ARGS

      - name: Upload audit report
        uses: actions/upload-artifact@v4
        with:
          name: styles-audit-report
          path: tasks/reports/styles/styles-audit-report.json

  styles-remediate:
    if: inputs.mode == 'remediate-dry-run' || inputs.mode == 'remediate-write'
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Install dependencies
        run: cd tools && npm ci

      - name: Run audit baseline (before remediation)
        run: node tools/scripts/validators/styles/audit-styles.js --json
        continue-on-error: true

      - name: Run styles remediation
        run: |
          MODE="${{ inputs.mode == 'remediate-write' && '--write' || '--dry-run' }}"
          ARGS="$MODE"
          if [ "${{ inputs.category }}" != "" ]; then
            ARGS="$ARGS --category ${{ inputs.category }}"
          fi
          node tools/scripts/remediators/styles/remediate-styles.js $ARGS

      - name: Run audit (after remediation)
        if: inputs.mode == 'remediate-write'
        run: node tools/scripts/validators/styles/audit-styles.js --json --verbose

      - name: Create PR with fixes
        if: inputs.mode == 'remediate-write'
        uses: peter-evans/create-pull-request@v7
        with:
          token: ${{ secrets.GITHUB_TOKEN }}
          commit-message: 'fix(styles): auto-remediate style governance violations'
          branch: chore/styles-remediation
          title: 'fix(styles): auto-remediate style governance violations'
          body: |
            ## Summary
            Automated style governance remediation run.

            **Fixes applied:**
            - Legacy CSS aliases → `--lp-*` tokens
            - `outline: none` → `outline: revert` (WCAG 2.4.7)
            - Hardcoded mermaid init directives → standard MermaidColours

            **Review:** Check the diff for correctness. All fixes are deterministic 1:1 replacements.

            ---
            🤖 Generated by [styles-governance.yml](/.github/workflows/styles-governance.yml)
          labels: styles, automated
