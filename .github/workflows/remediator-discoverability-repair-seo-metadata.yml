# type: remediator
# concern: discoverability
# pipeline: P6
name: SEO Metadata Refresh

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes)"
        type: boolean
        default: true

jobs:
  seo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd tools && npm ci

      - name: Generate SEO metadata
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node operations/scripts/remediators/content/seo/generate-seo.js --dry-run
          else
            node operations/scripts/remediators/content/seo/generate-seo.js
          fi

      - name: Commit refreshed SEO metadata
        if: inputs.dry_run != 'true'
        run: |
          if git diff --quiet; then
            echo "No SEO changes."
            exit 0
          fi
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore(seo): refresh metadata"
          git push origin HEAD:${{ vars.DEPLOY_BRANCH }}
