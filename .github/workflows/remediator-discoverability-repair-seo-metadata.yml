# type: remediator
# concern: discoverability
# pipeline: P6
name: SEO Metadata Refresh

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: "Dry run (no changes)"
        type: boolean
        default: true

jobs:
  seo:
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
      - run: cd tools && npm ci

      - name: Generate SEO metadata
        run: |
          if [ "${{ inputs.dry_run }}" = "true" ]; then
            node operations/scripts/remediators/content/seo/generate-seo.js --dry-run
          else
            node operations/scripts/remediators/content/seo/generate-seo.js
          fi

      - name: Collect changed files
        id: changes
        if: inputs.dry_run != 'true'
        run: |
          FILES=$(git diff --name-only | tr '\n' ',' | sed 's/,$//')
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          echo "has_changes=$( [ -n "$FILES" ] && echo true || echo false )" >> "$GITHUB_OUTPUT"

      - name: Post-remediation verification
        id: verify
        if: inputs.dry_run != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          node operations/scripts/dispatch/governance/post-remediation-verify.js \
            --remediator operations/scripts/remediators/content/seo/generate-seo.js \
            --files "${{ steps.changes.outputs.files }}" \
            --json | tee /tmp/verify-result.json || true
          echo "passed=$(node -e "try{console.log(JSON.parse(require('fs').readFileSync('/tmp/verify-result.json','utf8')).passed)}catch(e){console.log('true')}")" >> "$GITHUB_OUTPUT"

      - name: Commit refreshed SEO metadata
        if: inputs.dry_run != 'true' && steps.changes.outputs.has_changes == 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add -u
          git commit -m "chore(seo): refresh metadata${{ steps.verify.outputs.passed == 'false' && ' [needs-review]' || '' }}"
          git push origin HEAD:${{ vars.DEPLOY_BRANCH }}
