# type: audit
# concern: health
# pipeline: P5
name: Pipeline Freshness Monitor

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ vars.DEPLOY_BRANCH }}

      - name: Check pipeline freshness
        id: freshness
        shell: bash
        run: |
          echo "## Pipeline Freshness Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Data File | Last Commit | Hours Stale | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---:|---|" >> "$GITHUB_STEP_SUMMARY"

          stale_count=0
          stale_feeds=""
          now_epoch=$(date +%s)

          for file in \
            snippets/data/social-feeds/ghostBlogData.jsx \
            snippets/data/social-feeds/discordAnnouncementsData.jsx \
            snippets/data/social-feeds/forumData.jsx \
            snippets/data/social-feeds/lumaEventsData.jsx \
            snippets/data/showcase-feed/showcaseData.jsx \
            snippets/data/social-feeds/youtubeData.jsx \
            snippets/data/globals/latestRelease.jsx; do

            if [ ! -f "$file" ]; then
              echo "| $file | FILE MISSING | — | MISSING |" >> "$GITHUB_STEP_SUMMARY"
              stale_count=$((stale_count + 1))
              continue
            fi

            last_epoch=$(git log -1 --format='%ct' -- "$file" 2>/dev/null || echo "0")
            last_date=$(git log -1 --format='%ci' -- "$file" 2>/dev/null || echo "NO COMMITS")

            if [ -z "$last_epoch" ] || [ "$last_epoch" = "0" ]; then
              echo "| $file | $last_date | unknown | NO HISTORY |" >> "$GITHUB_STEP_SUMMARY"
              stale_count=$((stale_count + 1))
              continue
            fi

            hours_stale=$(( (now_epoch - last_epoch) / 3600 ))

            if [ "$hours_stale" -le 24 ]; then
              status="GREEN"
            elif [ "$hours_stale" -le 72 ]; then
              status="YELLOW"
            else
              status="RED"
              stale_count=$((stale_count + 1))
              stale_feeds="${stale_feeds}${file}\n"
            fi

            echo "| $file | $last_date | ${hours_stale}h | $status |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Stale or missing pipelines (>72h): ${stale_count}**" >> "$GITHUB_STEP_SUMMARY"

          echo "stale_count=${stale_count}" >> "$GITHUB_OUTPUT"
          if [ "$stale_count" -gt 0 ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi
          printf "stale_feeds<<EOF\n${stale_feeds}EOF\n" >> "$GITHUB_OUTPUT"

      - name: Create or update freshness issue
        if: steps.freshness.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const LABEL = 'health:data-freshness';
            const TITLE = 'Data Freshness: stale pipelines detected';
            const staleCount = '${{ steps.freshness.outputs.stale_count }}';

            let body = `## Data Freshness Alert\n\n${staleCount} pipeline(s) are stale (>72h since last update).\n\n`;
            body += `Stale feeds:\n\`\`\`\n${{ steps.freshness.outputs.stale_feeds }}\`\`\`\n\n`;
            body += `Workflow run: ${context.serverUrl}/${owner}/${repo}/actions/runs/${context.runId}`;

            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: LABEL, per_page: 1
            });

            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.data[0].number, body
              });
              core.info(`Updated issue #${existing.data[0].number}`);
            } else {
              const created = await github.rest.issues.create({
                owner, repo, title: TITLE, body, labels: [LABEL, 'automated']
              });
              core.info(`Created issue #${created.data.number}`);
            }

      - name: Close freshness issue if all clean
        if: steps.freshness.outputs.stale == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const existing = await github.rest.issues.listForRepo({
              owner, repo, state: 'open', labels: 'health:data-freshness', per_page: 1
            });
            if (existing.data.length > 0) {
              await github.rest.issues.update({
                owner, repo, issue_number: existing.data[0].number,
                state: 'closed', state_reason: 'completed',
                body: existing.data[0].body + '\n\n---\n**Resolved:** All pipelines fresh as of ' + new Date().toISOString()
              });
              core.info(`Closed issue #${existing.data[0].number}`);
            }
