# type: audit
# concern: health
# pipeline: P5
name: Pipeline Freshness Monitor

on:
  schedule:
    - cron: "0 8 * * *"
  workflow_dispatch:

permissions:
  contents: read
  issues: write
  actions: write

jobs:
  check-freshness:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ vars.DEPLOY_BRANCH }}

      - name: Check pipeline freshness
        id: freshness
        shell: bash
        run: |
          echo "## Pipeline Freshness Report" >> "$GITHUB_STEP_SUMMARY"
          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "| Data File | Last Commit | Hours Stale | Status |" >> "$GITHUB_STEP_SUMMARY"
          echo "|---|---|---:|---|" >> "$GITHUB_STEP_SUMMARY"

          stale_count=0
          stale_feeds=""
          now_epoch=$(date +%s)

          for file in \
            snippets/data/social-feeds/ghostBlogData.jsx \
            snippets/data/social-feeds/discordAnnouncementsData.jsx \
            snippets/data/social-feeds/forumData.jsx \
            snippets/data/social-feeds/lumaEventsData.jsx \
            snippets/data/showcase-feed/showcaseData.jsx \
            snippets/data/social-feeds/youtubeData.jsx \
            snippets/data/globals/latestRelease.jsx; do

            if [ ! -f "$file" ]; then
              echo "| $file | FILE MISSING | — | MISSING |" >> "$GITHUB_STEP_SUMMARY"
              stale_count=$((stale_count + 1))
              continue
            fi

            last_epoch=$(git log -1 --format='%ct' -- "$file" 2>/dev/null || echo "0")
            last_date=$(git log -1 --format='%ci' -- "$file" 2>/dev/null || echo "NO COMMITS")

            if [ -z "$last_epoch" ] || [ "$last_epoch" = "0" ]; then
              echo "| $file | $last_date | unknown | NO HISTORY |" >> "$GITHUB_STEP_SUMMARY"
              stale_count=$((stale_count + 1))
              continue
            fi

            hours_stale=$(( (now_epoch - last_epoch) / 3600 ))

            if [ "$hours_stale" -le 24 ]; then
              status="GREEN"
            elif [ "$hours_stale" -le 72 ]; then
              status="YELLOW"
            else
              status="RED"
              stale_count=$((stale_count + 1))
              stale_feeds="${stale_feeds}${file}\n"
            fi

            echo "| $file | $last_date | ${hours_stale}h | $status |" >> "$GITHUB_STEP_SUMMARY"
          done

          echo "" >> "$GITHUB_STEP_SUMMARY"
          echo "**Stale or missing pipelines (>72h): ${stale_count}**" >> "$GITHUB_STEP_SUMMARY"

          echo "stale_count=${stale_count}" >> "$GITHUB_OUTPUT"
          if [ "$stale_count" -gt 0 ]; then
            echo "stale=true" >> "$GITHUB_OUTPUT"
          else
            echo "stale=false" >> "$GITHUB_OUTPUT"
          fi
          printf "stale_feeds<<EOF\n${stale_feeds}EOF\n" >> "$GITHUB_OUTPUT"

      - name: Create or update freshness issue
        if: steps.freshness.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ri = require('./operations/scripts/interfaces/governance/lib/rolling-issue.js');
            const staleCount = '${{ steps.freshness.outputs.stale_count }}';
            let body = `## Data Freshness Alert\n\n${staleCount} pipeline(s) are stale (>72h since last update).\n\n`;
            body += `Stale feeds:\n\`\`\`\n${{ steps.freshness.outputs.stale_feeds }}\`\`\`\n`;
            await ri.upsert({ github, context, core, label: 'health:data-freshness', title: 'Data Freshness: stale pipelines detected', body });

      - name: Retrigger stale integrator workflows
        if: steps.freshness.outputs.stale == 'true'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const { owner, repo } = context.repo;
            const staleFeeds = '${{ steps.freshness.outputs.stale_feeds }}';
            // Social feeds + livepeer-release dispatch the consolidated workflow with a mode input.
            // Other feeds dispatch their own workflow.
            const feedToMode = {
              'ghostBlogData': 'ghost-blog',
              'discordAnnouncementsData': 'discord',
              'forumData': 'forum',
              'youtubeData': 'youtube',
              'rssData': 'rss-blog',
              'githubData': 'github',
              'latestRelease': 'livepeer-release',
            };
            const feedToWorkflow = {
              'showcaseData': 'project-showcase-sync.yml',
            };
            const ref = '${{ vars.DEPLOY_BRANCH || 'docs-v2' }}';
            // Dispatch consolidated social-feeds workflow with mode input
            for (const [feed, mode] of Object.entries(feedToMode)) {
              if (staleFeeds.includes(feed)) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner, repo,
                    workflow_id: 'dispatch-copy-update-social-feeds.yml',
                    ref,
                    inputs: { mode }
                  });
                  core.info(`Retriggered dispatch-copy-update-social-feeds.yml mode=${mode} for stale ${feed}`);
                } catch (e) {
                  core.warning(`Failed to retrigger mode=${mode}: ${e.message}`);
                }
              }
            }
            // Dispatch standalone workflows
            for (const [feed, workflow] of Object.entries(feedToWorkflow)) {
              if (staleFeeds.includes(feed)) {
                try {
                  await github.rest.actions.createWorkflowDispatch({
                    owner, repo, workflow_id: workflow, ref
                  });
                  core.info(`Retriggered ${workflow} for stale ${feed}`);
                } catch (e) {
                  core.warning(`Failed to retrigger ${workflow}: ${e.message}`);
                }
              }
            }

      - name: Close freshness issue if all clean
        if: steps.freshness.outputs.stale == 'false'
        uses: actions/github-script@v7
        with:
          github-token: ${{ secrets.GITHUB_TOKEN }}
          script: |
            const ri = require('./operations/scripts/interfaces/governance/lib/rolling-issue.js');
            await ri.close({ github, context, core, label: 'health:data-freshness', reason: 'All pipelines fresh' });
            }
