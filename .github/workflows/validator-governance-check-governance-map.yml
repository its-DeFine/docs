# type: validator
# concern: governance
# pipeline: P3
# pattern: C (Check)
name: Check Governance Map

on:
  pull_request:
    paths:
      - '**/GOVERNANCE.md'
      - 'docs-guide/frameworks/**'
      - 'docs-guide/standards/**'
      - 'docs-guide/policies/**'
      - 'operations/governance/config/**'
  schedule:
    # Daily staleness check at 06:00 UTC
    - cron: '0 6 * * *'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Run mode'
        required: false
        default: 'check'
        type: choice
        options:
          - check
          - write
          - repair

permissions:
  contents: read
  issues: write

jobs:
  check-governance-markers:
    name: Validate Governance Markers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check governance markers
        run: node operations/scripts/validators/governance/compliance/check-governance-markers.js

  check-governance-map:
    name: Generate & Validate Governance Map
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check governance map
        run: node operations/scripts/generators/governance/map/generate-governance-map.js --check

  check-jsdoc-headers:
    name: Validate JSDoc Headers
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check JSDoc headers
        run: node operations/scripts/validators/governance/compliance/check-jsdoc-headers.js

  check-script-locations:
    name: Validate Script Locations
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Check script locations
        run: node operations/scripts/validators/governance/compliance/check-script-locations.js

  check-new-file-governance:
    name: Validate New File Governance
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 2

      - name: Check new files have governance metadata
        run: node operations/scripts/validators/governance/compliance/check-new-file-governance.js --staged
        continue-on-error: true

  staleness-check:
    name: Framework Staleness Check
    runs-on: ubuntu-latest
    if: github.event_name == 'schedule' || github.event_name == 'workflow_dispatch'
    steps:
      - uses: actions/checkout@v4

      - name: Generate governance map report
        id: map
        run: |
          node operations/scripts/generators/governance/map/generate-governance-map.js --json > /tmp/governance-map.json
          echo "has_stale=$(jq '.summary.staleFrameworks > 0' /tmp/governance-map.json)" >> $GITHUB_OUTPUT

      - name: Create staleness issue
        if: steps.map.outputs.has_stale == 'true'
        uses: actions/github-script@v7
        with:
          script: |
            const fs = require('fs');
            const report = JSON.parse(fs.readFileSync('/tmp/governance-map.json', 'utf8'));
            const stale = report.staleFrameworks;
            if (stale.length === 0) return;

            const body = [
              '## Stale Governance Frameworks Detected',
              '',
              '| Framework | Last Verified | Days Stale |',
              '|-----------|--------------|------------|',
              ...stale.map(f => `| \`${f.path}\` | ${f.lastVerified || 'never'} | ${f.daysSinceVerified} |`),
              '',
              'Run `node operations/scripts/remediators/governance/compliance/repair-governance-artifacts.js --write` to update.',
              '',
              'Generated by [Check Governance Map](' + context.serverUrl + '/' + context.repo.owner + '/' + context.repo.repo + '/actions/runs/' + context.runId + ')'
            ].join('\n');

            await github.rest.issues.create({
              owner: context.repo.owner,
              repo: context.repo.repo,
              title: `Governance staleness: ${stale.length} framework(s) need verification`,
              body,
              labels: ['governance-stale', 'automated']
            });

  repair:
    name: Repair Governance Artifacts
    runs-on: ubuntu-latest
    if: github.event_name == 'workflow_dispatch' && github.event.inputs.mode == 'repair'
    steps:
      - uses: actions/checkout@v4

      - name: Run repair
        run: node operations/scripts/remediators/governance/compliance/repair-governance-artifacts.js --write

      - name: Create PR with repairs
        uses: peter-evans/create-pull-request@v5
        with:
          commit-message: 'chore(governance): auto-repair governance artifacts'
          title: 'chore(governance): auto-repair governance artifacts'
          body: 'Automated governance artifact repair. Review changes before merging.'
          branch: governance/auto-repair
          labels: governance, automated
