name: Generate Component Registry

on:
  push:
    branches:
      - docs-v2
    paths:
      - 'snippets/components/**/*.jsx'
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  generate-component-registry:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.use_test_branch == 'true' && vars.TEST_BRANCH || vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target branch
        id: branch
        run: |
          if [ "${{ inputs.use_test_branch }}" = "true" ]; then
            echo "name=${{ vars.TEST_BRANCH }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ vars.DEPLOY_BRANCH }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        working-directory: tools
        run: npm install

      - name: Regenerate component registry
        run: node operations/scripts/generators/components/library/generate-component-registry.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code \
            docs-guide/config/component-registry.json \
            docs-guide/config/component-registry-schema.json \
          || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name "GitHub Actions Bot"
          git config user.email "actions@github.com"
          git add \
            docs-guide/config/component-registry.json \
            docs-guide/config/component-registry-schema.json
          git commit -m "chore(components): regenerate component registry - $(date -u +"%Y-%m-%dT%H:%M:%SZ")"
          git push origin HEAD:${{ steps.branch.outputs.name }}
