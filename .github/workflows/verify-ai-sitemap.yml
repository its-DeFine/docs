name: Verify AI Sitemap

on:
  push:
    branches:
      - docs-v2
  pull_request:
    branches:
      - docs-v2
  workflow_dispatch:

jobs:
  verify-ai-sitemap:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "22"

      - name: Install dependencies
        run: cd tools && npm install

      - name: Verify AI sitemap output
        run: node operations/scripts/generators/content/seo/generate-ai-sitemap.js --check
