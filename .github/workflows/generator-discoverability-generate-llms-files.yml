# type: generator
# concern: discoverability
# pipeline: P4
name: Generate llms.txt

on:
  push:
    branches: [docs-v2]
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          ref: ${{ inputs.use_test_branch == 'true' && vars.TEST_BRANCH || vars.DEPLOY_BRANCH }}

      - name: Resolve target branch
        id: branch
        run: |
          if [ "${{ inputs.use_test_branch }}" = "true" ]; then
            echo "name=${{ vars.TEST_BRANCH }}" >> "$GITHUB_OUTPUT"
          else
            echo "name=${{ vars.DEPLOY_BRANCH }}" >> "$GITHUB_OUTPUT"
          fi

      - uses: actions/setup-node@v4
        with:
          node-version: "20"

      - run: cd tools && npm ci

      - name: Generate llms files
        run: node operations/scripts/generators/ai/llm/generate-llms-files.js --write

      - name: Commit if changed
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add llms.txt
          git diff --cached --quiet || git commit -m "chore: regenerate llms.txt [skip ci]"
          git push origin HEAD:${{ steps.branch.outputs.name }}
