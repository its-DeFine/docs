# type: generator
# concern: maintenance
# pipeline: P4
name: Generate Docs Guide Catalogs

on:
  push:
    branches:
      - docs-v2
    paths:
      - '.github/workflows/**'
      - '.github/ISSUE_TEMPLATE/**'
      - '.github/pull-request-template-v2.md'
      - '.github/pull_request_template.md'
      - 'docs.json'
      - 'v2/index.mdx'
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  generate-docs-guide-catalogs:
    uses: ./.github/workflows/dispatch-maintenance-check-catalogs.yml
    with:
      mode: generate-docs-guide-catalogs
      use_test_branch: ${{ inputs.use_test_branch || false }}
    secrets: inherit
