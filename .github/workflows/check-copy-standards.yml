# validator-brand-check-copy-standards.yml
# P3 advisory: reports copy/brand violations but does not block merge.
# Promotes to P2 after baseline violations cleared (D-GOV-05).
# Decision: D-GOV-03 (every detection must self-repair or escalate)
name: Check Copy Standards

on:
  pull_request:
    paths:
      - 'v2/**/*.mdx'
      - 'docs-guide/**/*.mdx'
  workflow_dispatch: {}

permissions:
  contents: read

jobs:
  copy-lint:
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - name: Banned Words
            script: operations/scripts/validators/content/copy/lint-copy.js
          - name: Copy Patterns
            script: operations/scripts/validators/content/copy/lint-patterns.js
          - name: EN-GB Grammar
            script: operations/scripts/validators/content/grammar/check-grammar-en-gb.js
          - name: Proper Nouns
            script: operations/scripts/validators/content/grammar/check-proper-nouns.js

    name: ${{ matrix.name }}
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: '20'
      - run: cd tools && npm ci

      - name: Run ${{ matrix.name }}
        id: check
        continue-on-error: true
        run: node ${{ matrix.script }}

      - name: Step summary
        if: always()
        run: |
          if [ "${{ steps.check.outcome }}" = "failure" ]; then
            echo "## ${{ matrix.name }}: issues found" >> $GITHUB_STEP_SUMMARY
            echo "" >> $GITHUB_STEP_SUMMARY
            echo "This check is advisory (P3). Fix violations to promote to P2 hard gate." >> $GITHUB_STEP_SUMMARY
          else
            echo "## ${{ matrix.name }}: clean" >> $GITHUB_STEP_SUMMARY
          fi
