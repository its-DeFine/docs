name: Update Livepeer Release Version

# Primary trigger: repository_dispatch fired by livepeer/go-livepeer when a release is published.
# Fallback:        daily schedule (safety net — catches any missed dispatch events).
# Manual:          workflow_dispatch with optional version override.
#
# Companion workflow required in livepeer/go-livepeer:
#   workspace/plan/active/AUTOMATIONS-RESTRUCTURE/go-livepeer-notify-docs.yml
#   Requires DOCS_DISPATCH_TOKEN secret in go-livepeer (fine-grained PAT:
#   actions:write scoped to livepeer/docs).

on:
  repository_dispatch:
    types: [go-livepeer-release]

  schedule:
    - cron: "0 6 * * *" # Daily fallback at 06:00 UTC

  workflow_dispatch:
    inputs:
      version:
        description: "Version to set (e.g. v0.7.8). Leave blank to fetch latest from GitHub API."
        required: false

jobs:
  update-release:
    runs-on: ubuntu-latest

    permissions:
      contents: write

    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          ref: main
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Resolve target version
        id: version
        run: |
          if [[ -n "${{ github.event.client_payload.version }}" ]]; then
            VERSION="${{ github.event.client_payload.version }}"
            echo "source=repository_dispatch" >> $GITHUB_OUTPUT
          elif [[ -n "${{ inputs.version }}" ]]; then
            VERSION="${{ inputs.version }}"
            echo "source=workflow_dispatch" >> $GITHUB_OUTPUT
          else
            VERSION=$(curl -sf \
              -H "Authorization: Bearer ${{ secrets.GITHUB_TOKEN }}" \
              -H "Accept: application/vnd.github+json" \
              "https://api.github.com/repos/livepeer/go-livepeer/releases/latest" \
              | jq -r '.tag_name')
            echo "source=api_fallback" >> $GITHUB_OUTPUT
          fi
          echo "version=${VERSION}" >> $GITHUB_OUTPUT
          echo "Resolved version: ${VERSION}"

      - name: Read current version
        id: current
        run: |
          CURRENT=$(grep -oP 'latestVersion = "\K[^"]+' snippets/automations/globals/globals.jsx || echo "")
          echo "version=${CURRENT}" >> $GITHUB_OUTPUT
          echo "Current version: ${CURRENT}"

      - name: Update globals.jsx
        if: |
          steps.version.outputs.version != steps.current.outputs.version &&
          steps.version.outputs.version != 'null' &&
          steps.version.outputs.version != ''
        run: |
          VERSION="${{ steps.version.outputs.version }}"
          sed -i "s|latestVersion = \"[^\"]*\"|latestVersion = \"${VERSION}\"|" snippets/automations/globals/globals.jsx
          sed -i "s|releases/download/[^\"]*\"|releases/download/${VERSION}\"|" snippets/automations/globals/globals.jsx
          echo "Updated globals.jsx:"
          cat snippets/automations/globals/globals.jsx

      - name: Commit and push
        if: |
          steps.version.outputs.version != steps.current.outputs.version &&
          steps.version.outputs.version != 'null' &&
          steps.version.outputs.version != ''
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add snippets/automations/globals/globals.jsx
          git commit -m "chore: update go-livepeer release to ${{ steps.version.outputs.version }} [skip ci]"
          git push
