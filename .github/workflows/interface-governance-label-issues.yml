# type: interface
# concern: governance
# pipeline: P7
name: Issue Auto Label

on:
  issues:
    types: [opened, edited]

permissions:
  issues: write
  contents: read

jobs:
  auto-label:
    if: ${{ !github.event.issue.pull_request }}
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Parse issue form and apply labels
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./operations/scripts/interfaces/governance/issue-auto-label.js');
            return await run({ github, context });
