# type: remediator
# concern: brand
# pipeline: P6
# remediator-brand-repair-frontmatter-and-em-dashes.yml
# Auto-repair pass for the two deterministic copy-quality classes that have already
# tripped builds and hooks: (1) em-dash characters in authored MDX, (2) single-quoted
# YAML frontmatter scalars (which break on unescaped apostrophes). Standard is double
# quotes for frontmatter strings, en-dash for em-dash.
#
# Runs on every PR touching MDX. If fixes are needed, the workflow commits them back to
# the PR branch directly so the author does not need to handle them.

name: Repair Frontmatter Quotes & Em-Dashes

on:
  pull_request:
    paths:
      - 'v2/**/*.mdx'
      - 'docs-guide/**/*.mdx'
  workflow_dispatch:
    inputs:
      scope:
        description: 'Scope: full or changed'
        type: choice
        options:
          - changed
          - full
        default: changed

permissions:
  contents: write
  pull-requests: write

jobs:
  repair:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout PR branch (writeable)
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event.pull_request.head.ref || github.ref }}
          repository: ${{ github.event.pull_request.head.repo.full_name || github.repository }}
          token: ${{ secrets.GITHUB_TOKEN }}
          fetch-depth: 0

      - uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Compute target file list
        id: targets
        run: |
          set -e
          if [ "${{ github.event_name }}" = "pull_request" ]; then
            BASE_SHA="${{ github.event.pull_request.base.sha }}"
            git fetch origin "$BASE_SHA" --depth=1 || true
            FILES=$(git diff --name-only "$BASE_SHA"...HEAD -- 'v2/**/*.mdx' 'docs-guide/**/*.mdx' | tr '\n' ',' | sed 's/,$//')
          elif [ "${{ inputs.scope }}" = "full" ]; then
            FILES=""
          else
            FILES=$(git diff --name-only HEAD~1 HEAD -- 'v2/**/*.mdx' 'docs-guide/**/*.mdx' | tr '\n' ',' | sed 's/,$//')
          fi
          echo "files=$FILES" >> "$GITHUB_OUTPUT"
          if [ -z "$FILES" ]; then
            echo "scope_flag=" >> "$GITHUB_OUTPUT"
          else
            echo "scope_flag=--files=$FILES" >> "$GITHUB_OUTPUT"
          fi
          echo "Target files: $FILES"

      - name: Repair em-dashes
        if: steps.targets.outputs.files != '' || inputs.scope == 'full'
        run: |
          node operations/scripts/remediators/content/style/remediate-em-dashes.js \
            --write ${{ steps.targets.outputs.scope_flag }}

      - name: Repair frontmatter quoting (single -> double)
        if: steps.targets.outputs.files != '' || inputs.scope == 'full'
        run: |
          node operations/scripts/remediators/content/style/remediate-frontmatter-quotes.js \
            --write ${{ steps.targets.outputs.scope_flag }}

      - name: Verify no regressions remain
        if: steps.targets.outputs.files != '' || inputs.scope == 'full'
        run: |
          node operations/scripts/remediators/content/style/remediate-em-dashes.js \
            --verify ${{ steps.targets.outputs.scope_flag }} || (echo "::error::Em-dash regression after repair" && exit 1)
          node operations/scripts/remediators/content/style/remediate-frontmatter-quotes.js \
            --verify ${{ steps.targets.outputs.scope_flag }} || (echo "::error::Frontmatter-quote regression after repair" && exit 1)

      - name: Detect changes
        id: changed
        run: |
          if [ -n "$(git status --porcelain)" ]; then
            echo "has_changes=true" >> "$GITHUB_OUTPUT"
            git status --short
          else
            echo "has_changes=false" >> "$GITHUB_OUTPUT"
          fi

      - name: Commit repairs back to PR branch
        if: steps.changed.outputs.has_changes == 'true' && github.event_name == 'pull_request'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add -u
          git commit -m "fix(copy): auto-repair em-dashes and frontmatter quoting

          Standardised frontmatter scalars to double quotes and replaced em-dash
          characters with en-dash in authored MDX. Generated by
          .github/workflows/remediator-brand-repair-frontmatter-and-em-dashes.yml"
          git push

      - name: Step summary
        if: always()
        run: |
          if [ "${{ steps.changed.outputs.has_changes }}" = "true" ]; then
            echo "## Repair: applied" >> "$GITHUB_STEP_SUMMARY"
            echo "" >> "$GITHUB_STEP_SUMMARY"
            echo '```' >> "$GITHUB_STEP_SUMMARY"
            git log --format='%h %s' -1 >> "$GITHUB_STEP_SUMMARY" || true
            echo '```' >> "$GITHUB_STEP_SUMMARY"
          else
            echo "## Repair: nothing to fix" >> "$GITHUB_STEP_SUMMARY"
          fi
