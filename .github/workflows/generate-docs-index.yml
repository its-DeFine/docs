name: Generate Docs Index

on:
  push:
    branches:
      - docs-v2
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  generate-docs-index:
    uses: ./.github/workflows/docs-catalog-governance.yml
    with:
      mode: generate-docs-index
      use_test_branch: ${{ inputs.use_test_branch || false }}
    secrets: inherit
