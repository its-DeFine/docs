# NOTE: THIS GITHUB ACTION WILL ONLY RUN ON MAIN BRANCH.
# N8N IS BEING USING AS AN ALTERNATIVE UNTIL THEN.
# N8N workflow is in /snippets/automations/n8n-workflows/forum-to-mintlify-latest-topics.json
name: Update Forum Data

on:
  schedule:
    # Run daily at 00:00 UTC
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  update-forum-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.use_test_branch == 'true' && vars.TEST_BRANCH || vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and process forum data
        run: |
          node .github/scripts/fetch-forum-data.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code snippets/automations/forum/forumData.jsx || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add snippets/automations/forum/forumData.jsx
          git commit -m "chore: update forum data [skip ci]"
          git push
