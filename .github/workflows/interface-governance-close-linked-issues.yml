# type: interface
# concern: governance
# pipeline: P7
name: Close Linked Issues (docs-v2 Merge)

on:
  pull_request:
    types:
      - opened
      - closed

permissions:
  contents: read
  pull-requests: read
  issues: write

jobs:
  close-linked-issues:
    if: github.event.pull_request.merged == true && github.event.pull_request.base.ref == 'docs-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Close linked same-repo issues
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./operations/scripts/interfaces/governance/close-linked-issues.js');
            return await run({ github, context, core });

  notify-linked-issues:
    if: github.event.action == 'opened' && github.event.pull_request.base.ref == 'docs-v2'
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
      - name: Notify linked issues that a PR has been opened
        uses: actions/github-script@v7
        with:
          script: |
            const run = require('./operations/scripts/interfaces/governance/notify-linked-issues.js');
            return await run({ github, context });
