# type: remediator
# concern: governance
# pipeline: P6
name: Governance Repair

on:
  schedule:
    - cron: '0 5 * * 1'
  workflow_dispatch:
    inputs:
      mode:
        description: 'Execution mode'
        type: choice
        options:
          - dry-run
          - fix
          - report-only
        default: dry-run

permissions:
  contents: write
  issues: write
  pull-requests: write

jobs:
  repair-governance:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0
          ref: ${{ vars.DEPLOY_BRANCH }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      - name: Ensure governance approval labels
        uses: actions/github-script@v7
        with:
          script: |
            const labels = [
              { name: 'approval:governance-schema', color: '5319e7', description: 'Human approval recorded for canonical governance schema changes' },
              { name: 'approval:governance-gate', color: 'b60205', description: 'Human approval recorded for governance gate or enforcement changes' },
              { name: 'approval:workflow-governance', color: '1d76db', description: 'Human approval recorded for transitional workflow-governance changes' },
              { name: 'approval:governance-retirement', color: 'd93f0b', description: 'Human approval recorded for governance/runtime retirement changes' },
            ];
            for (const label of labels) {
              try {
                await github.rest.issues.getLabel({ owner: context.repo.owner, repo: context.repo.repo, name: label.name });
              } catch (error) {
                if (error.status !== 404) throw error;
                await github.rest.issues.createLabel({ owner: context.repo.owner, repo: context.repo.repo, ...label });
              }
            }

      - name: Install tools dependencies
        working-directory: tools
        run: npm ci

      - name: Generate root governance projections
        run: node operations/scripts/generators/governance/root/generate-root-governance-artifacts.js --write

      - name: Validate root governance sync
        run: node operations/scripts/validators/governance/compliance/check-root-governance-sync.js

      - name: Generate repo governance status
        run: node operations/scripts/generators/governance/reports/generate-repo-governance-status.js --write

      - name: Validate repo governance sync
        run: node operations/scripts/validators/governance/compliance/check-repo-governance-sync.js

      - name: Resolve run mode
        id: mode
        run: |
          if [ "${{ github.event_name }}" = "schedule" ]; then
            echo "mode=fix" >> "$GITHUB_OUTPUT"
          else
            echo "mode=${{ inputs.mode || 'dry-run' }}" >> "$GITHUB_OUTPUT"
          fi

      - name: Run governance repair orchestrator
        id: repair
        shell: bash
        run: |
          set +e
          ARGS=()
          case "${{ steps.mode.outputs.mode }}" in
            dry-run)
              ARGS+=(--dry-run)
              ;;
            report-only)
              ARGS+=(--report-only)
              ;;
            fix)
              ;;
            *)
              echo "::error::Unsupported mode: ${{ steps.mode.outputs.mode }}"
              echo "exit_code=1" >> "$GITHUB_OUTPUT"
              exit 0
              ;;
          esac

          node operations/scripts/dispatch/governance/pipelines/governance-pipeline.js "${ARGS[@]}"
          EXIT_CODE=$?
          echo "exit_code=$EXIT_CODE" >> "$GITHUB_OUTPUT"
          exit 0

      - name: Revalidate active governance outputs
        if: always()
        run: |
          node operations/scripts/validators/governance/compliance/check-root-governance-sync.js
          node operations/scripts/validators/governance/compliance/check-repo-governance-sync.js

      - name: Build repair summary
        id: summary
        if: always()
        run: |
          node <<'NODE'
          const fs = require('fs');
          const { execSync } = require('child_process');
          const reportPath = 'workspace/reports/repo-ops/REPAIR_REPORT_LATEST.json';
          const outputPath = process.env.GITHUB_OUTPUT;
          const summaryPath = process.env.GITHUB_STEP_SUMMARY;
          const runUrl = `${process.env.GITHUB_SERVER_URL}/${process.env.GITHUB_REPOSITORY}/actions/runs/${process.env.GITHUB_RUN_ID}`;
          const changedFiles = execSync('git diff --name-only', { encoding: 'utf8' })
            .split('\n')
            .map((line) => line.trim())
            .filter(Boolean);

          const lines = [
            '## Governance Repair',
            '',
            `- Mode: ${process.env.RUN_MODE}`,
            `- Run: ${runUrl}`,
            `- Exit code: ${process.env.RUN_EXIT_CODE}`
          ];

          if (!fs.existsSync(reportPath)) {
            lines.push('- Repair report: missing');
            fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`);
            fs.appendFileSync(outputPath, `changed=${changedFiles.length > 0 ? 'true' : 'false'}\n`);
            fs.appendFileSync(outputPath, `files_modified_count=${changedFiles.length}\n`);
            fs.appendFileSync(outputPath, `files_modified<<EOF\n${changedFiles.join('\n')}\nEOF\n`);
            process.exit(0);
          }

          const report = JSON.parse(fs.readFileSync(reportPath, 'utf8'));
          const reportFiles = Array.isArray(report?.repairs_applied?.files_modified)
            ? report.repairs_applied.files_modified
            : [];
          const filesModified = [...new Set([...reportFiles, ...changedFiles])];
          const changed = process.env.RUN_MODE === 'fix' && filesModified.length > 0;

          lines.push(`- Verification: ${report.verification}`);
          lines.push(`- Total fixes: ${report.repairs_applied?.total_fixes ?? 0}`);
          lines.push(`- Needs human: ${(report.needs_human || []).length}`);
          lines.push(`- Files modified: ${filesModified.length}`);

          if (filesModified.length > 0) {
            lines.push('');
            lines.push('### Files Modified');
            filesModified.forEach((repoPath) => lines.push(`- ${repoPath}`));
          }

          fs.appendFileSync(summaryPath, `${lines.join('\n')}\n`);
          fs.appendFileSync(outputPath, `changed=${changed ? 'true' : 'false'}\n`);
          fs.appendFileSync(outputPath, `files_modified_count=${filesModified.length}\n`);
          fs.appendFileSync(outputPath, `run_url=${runUrl}\n`);
          fs.appendFileSync(outputPath, `verification=${report.verification}\n`);
          fs.appendFileSync(outputPath, `total_fixes=${report.repairs_applied?.total_fixes ?? 0}\n`);
          fs.appendFileSync(outputPath, `needs_human=${(report.needs_human || []).length}\n`);
          fs.appendFileSync(outputPath, `files_modified<<EOF\n${filesModified.join('\n')}\nEOF\n`);
          NODE
        env:
          RUN_MODE: ${{ steps.mode.outputs.mode }}
          RUN_EXIT_CODE: ${{ steps.repair.outputs.exit_code }}

      - name: Upload governance repair artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: governance-repair-${{ github.run_id }}
          path: |
            workspace/reports/repo-ops/REPAIR_REPORT_LATEST.json
            workspace/reports/repo-ops/REPAIR_REPORT_LATEST.md
            workspace/reports/repo-ops/ROOT_GOVERNANCE_SYNC_LATEST.json
            workspace/reports/repo-ops/ROOT_GOVERNANCE_SYNC_LATEST.md
            workspace/reports/repo-ops/REPO_GOVERNANCE_STATUS_LATEST.json
            workspace/reports/repo-ops/REPO_GOVERNANCE_STATUS_LATEST.md
            workspace/reports/repo-ops/OWNERLESS_REPO_HANDOVER_LATEST.md
            workspace/reports/repo-ops/SCRIPT_INVENTORY_FULL.json
            workspace/reports/repo-ops/SCRIPT_INVENTORY_FULL.md
          if-no-files-found: warn
          retention-days: 7

      - name: Create or update repair PR
        if: steps.mode.outputs.mode == 'fix' && steps.summary.outputs.changed == 'true' && steps.repair.outputs.exit_code != '1'
        uses: peter-evans/create-pull-request@v7
        with:
          branch: automation/governance-repair
          base: docs-v2
          title: 'chore(governance): automated governance repair'
          commit-message: 'chore(governance): automated governance repair'
          add-paths: ${{ steps.summary.outputs.files_modified }}
          body: |
            Automated governance repair run.

            - Run URL: ${{ steps.summary.outputs.run_url }}
            - Verification: ${{ steps.summary.outputs.verification }}
            - Total fixes: ${{ steps.summary.outputs.total_fixes }}
            - Needs human items: ${{ steps.summary.outputs.needs_human }}
            - Changed files: ${{ steps.summary.outputs.files_modified_count }}

            Reports:
            - `workspace/reports/repo-ops/REPAIR_REPORT_LATEST.json`
            - `workspace/reports/repo-ops/REPAIR_REPORT_LATEST.md`
            - `workspace/reports/repo-ops/OWNERLESS_REPO_HANDOVER_LATEST.md`

      - name: Fail on blocking repair error
        if: steps.repair.outputs.exit_code == '1'
        run: |
          echo "Governance repair verification failed."
          exit 1
