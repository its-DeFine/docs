name: Update Ghost Blog Data

on:
  schedule:
    - cron: "0 0 * * *"
  workflow_dispatch:
    inputs:
      use_test_branch:
        description: "Write to TEST_BRANCH (docs-v2-dev) instead of DEPLOY_BRANCH"
        type: boolean
        default: false

jobs:
  update-ghost-data:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout docs repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.use_test_branch == 'true' && vars.TEST_BRANCH || vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Fetch and process Ghost blog data
        run: |
          node .github/scripts/fetch-ghost-blog-data.js

      - name: Check for changes
        id: git-check
        run: |
          git diff --exit-code snippets/automations/blog/ghostBlogData.jsx || echo "changed=true" >> $GITHUB_OUTPUT

      - name: Commit and push if changed
        if: steps.git-check.outputs.changed == 'true'
        run: |
          git config user.name 'github-actions[bot]'
          git config user.email 'github-actions[bot]@users.noreply.github.com'
          git add snippets/automations/blog/ghostBlogData.jsx
          git commit -m "chore: update Ghost blog data [skip ci]"
          git push
