# generator-maintenance-generate-action-docs.yml
#
# Regenerates the actions-library documentation pages whenever
# workflow files or the audit data change.
#
# Type: generator | Concern: maintenance | Pipeline: P4 (post-merge)
# Decision: D-ACT-08 (workflows are dispatchers, this documents them)

name: Generate Action Documentation

on:
  push:
    branches:
      - ${{ vars.DEPLOY_BRANCH }}
    paths:
      - ".github/workflows/**"
      - ".github/workspace/actions-audit.json"
      - ".github/workspace/generate-action-pages.js"

  workflow_dispatch:
    inputs:
      dry_run:
        description: "Show changes without writing"
        type: boolean
        default: false

permissions:
  contents: write

concurrency:
  group: ${{ github.workflow }}
  cancel-in-progress: true

jobs:
  generate-docs:
    runs-on: ubuntu-latest

    steps:
      - name: Checkout repository
        uses: actions/checkout@v4
        with:
          ref: ${{ vars.DEPLOY_BRANCH }}
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"

      - name: Generate action pages
        run: |
          set -euo pipefail
          FLAGS=""
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then FLAGS="--dry-run"; fi
          node .github/workspace/generate-action-pages.js $FLAGS

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet && [ -z "$(git ls-files --others --exclude-standard .github/workspace/actions-library/)" ]; then
            echo "changed=false" >> $GITHUB_OUTPUT
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Changed files:"
            git diff --name-only
            git ls-files --others --exclude-standard .github/workspace/actions-library/
          fi

      - name: Commit and push
        if: steps.changes.outputs.changed == 'true' && inputs.dry_run != 'true'
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add .github/workspace/actions-library/
          git commit -m "chore(actions): regenerate action documentation pages [skip ci]"
          git push

      - name: Step summary
        if: always()
        run: |
          echo "## Action Documentation Generation" >> $GITHUB_STEP_SUMMARY
          if [[ "${{ steps.changes.outputs.changed }}" == "true" ]]; then
            echo "Pages regenerated and committed." >> $GITHUB_STEP_SUMMARY
          else
            echo "No changes detected. Pages are up to date." >> $GITHUB_STEP_SUMMARY
          fi
          if [[ "${{ inputs.dry_run }}" == "true" ]]; then
            echo "*(dry-run mode, no files written)*" >> $GITHUB_STEP_SUMMARY
          fi
