name: Feature Request (Docs/Site)
description: Request a new docs/site/platform guidance capability with clear acceptance criteria.
title: "[feature]: <short summary>"
labels: ["docs-v2", "help wanted", "status: needs-triage", "type: enhancement"]
body:
  - type: dropdown
    id: area
    attributes:
      label: Area
      description: Select the primary area this request affects.
      options:
        - area: home-about
        - area: community
        - area: developers
        - area: gateways
        - area: orchestrators
        - area: lpt-governance
        - area: resources
        - area: ci-cd
        - area: structure
        - area: multiple
    validations:
      required: true

  - type: input
    id: page_or_path
    attributes:
      label: Affected page URL or file path
      description: Optional if request is broad.
      placeholder: https://docs.livepeer.org/... or v2/pages/... 
    validations:
      required: false

  - type: textarea
    id: problem_statement
    attributes:
      label: Problem statement
      description: What problem does this request solve?
    validations:
      required: true

  - type: textarea
    id: proposed_solution
    attributes:
      label: Proposed solution
      description: Describe the desired capability or change.
    validations:
      required: true

  - type: textarea
    id: user_benefit
    attributes:
      label: User benefit
      description: Who benefits and how?
    validations:
      required: true

  - type: textarea
    id: alternatives
    attributes:
      label: Alternatives considered
      description: What alternatives did you evaluate?
    validations:
      required: true

  - type: textarea
    id: requested_action
    attributes:
      label: Action requested from maintainers
      description: What specific action should maintainers take?
    validations:
      required: true

  - type: textarea
    id: acceptance_criteria
    attributes:
      label: Acceptance criteria / done criteria
      description: Define completion checks for this request.
    validations:
      required: true

  - type: dropdown
    id: priority
    attributes:
      label: Priority
      options:
        - priority: critical
        - priority: high
        - priority: medium
        - priority: low
    validations:
      required: true

  - type: textarea
    id: mockups_examples
    attributes:
      label: Mockups or examples
      description: Optional references from other docs/products.
    validations:
      required: false

  - type: textarea
    id: rollout_notes
    attributes:
      label: Rollout notes
      description: Optional sequencing or rollout constraints.
    validations:
      required: false

  - type: textarea
    id: additional_context
    attributes:
      label: Additional context
    validations:
      required: false

  - type: checkboxes
    id: checks
    attributes:
      label: Submission checks
      options:
        - label: I searched existing issues and did not find an equivalent request.
          required: true
        - label: I provided enough detail for maintainers to evaluate and implement.
          required: true
