<title style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Technical view: network software meets protocol contracts</title>
<desc style="fill:rgb(0, 0, 0);stroke:none;color:rgb(255, 255, 255);stroke-width:1px;stroke-linecap:butt;stroke-linejoin:miter;opacity:1;font-family:&quot;Anthropic Sans&quot;, -apple-system, &quot;system-ui&quot;, &quot;Segoe UI&quot;, sans-serif;font-size:16px;font-weight:400;text-anchor:start;dominant-baseline:auto">Four horizontal tiers showing how off-chain network software interacts with on-chain protocol contracts on Arbitrum One. Tiers: stake action via BondingManager.bond, ticket redemption via TicketBroker.redeemWinningTicket, round rewards via BondingManager.reward, governance via vote. Below the tiers, a footer note lists activities that stay entirely off-chain: job discovery, capability negotiation, segment delivery, probabilistic ticket exchange.</desc>
